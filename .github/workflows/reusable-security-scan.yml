name: Reusable Security Scanning

# Description: This is a reusable workflow for security scanning with Trivy
# It can be called by other workflows to provide standardized security scanning

on:
  workflow_call:
    inputs:
      working_directory:
        description: 'Directory to scan'
        type: string
        default: '.'
      target_type:
        description: 'Type of target to scan (fs, repo, image)'
        type: string
        default: 'fs'
      format:
        description: 'Output format (sarif, json, table)'
        type: string
        default: 'sarif'
      severity:
        description: 'Severities to filter (UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL)'
        type: string
        default: 'MEDIUM,HIGH,CRITICAL'
      upload_to_security_tab:
        description: 'Whether to upload results to GitHub Security tab'
        type: boolean
        default: true

jobs:
  security-scan:
    name: "Security Scan"
    runs-on: ubuntu-latest
    
    # Least-privilege permissions for the job
    permissions:
      contents: read
      security-events: write  # Needed to upload SARIF results
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get current date for cache key
        id: date
        run: echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Cache Trivy vulnerability database
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ steps.date.outputs.date }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO- https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -cs) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy vulnerability scanner
        env:
          TRIVY_TARGET_TYPE: ${{ inputs.target_type }}
          TRIVY_FORMAT: ${{ inputs.format }}
          TRIVY_SEVERITY: ${{ inputs.severity }}
          TRIVY_WORKING_DIR: ${{ inputs.working_directory }}
        run: |
          echo "🔍 Starting Trivy security scan (severity: ${TRIVY_SEVERITY})..."
          if [ "${TRIVY_TARGET_TYPE}" = "image" ]; then
            trivy image --no-progress --skip-version-check --config trivy.yaml --skip-files '.github/codeql/queries/*' --format "${TRIVY_FORMAT}" --output "trivy-results.${TRIVY_FORMAT}" --severity "${TRIVY_SEVERITY}" --exit-code 0 --ignore-unfixed "${TRIVY_WORKING_DIR}"
          else
            trivy "${TRIVY_TARGET_TYPE}" --no-progress --skip-version-check --config trivy.yaml --skip-files '.github/codeql/queries/*' --format "${TRIVY_FORMAT}" --output "trivy-results.${TRIVY_FORMAT}" --severity "${TRIVY_SEVERITY}" --exit-code 0 --ignore-unfixed "${TRIVY_WORKING_DIR}"
          fi
          echo ""
          echo "--- Trivy Findings (Top 100) ---"
          if [ -f "trivy-results.sarif" ] && command -v jq >/dev/null 2>&1; then
            jq '.runs[].results[] | select(.level=="error" or .level=="warning")' trivy-results.sarif 2>/dev/null | head -100 || true
          elif [ -f "trivy-results.sarif" ]; then
            grep -E '"level": "(error|warning)"' trivy-results.sarif 2>/dev/null | head -100 || true
          fi
          echo "--- End Trivy Findings ---"
          echo ""
          # Now rerun with exit code 1 for CI fail if there are findings
          if [ "${TRIVY_TARGET_TYPE}" = "image" ]; then
            trivy image --no-progress --skip-version-check --config trivy.yaml --skip-files '.github/codeql/queries/*' --format "${TRIVY_FORMAT}" --output /dev/null --severity "${TRIVY_SEVERITY}" --exit-code 1 --ignore-unfixed "${TRIVY_WORKING_DIR}"
          else
            trivy "${TRIVY_TARGET_TYPE}" --no-progress --skip-version-check --config trivy.yaml --skip-files '.github/codeql/queries/*' --format "${TRIVY_FORMAT}" --output /dev/null --severity "${TRIVY_SEVERITY}" --exit-code 1 --ignore-unfixed "${TRIVY_WORKING_DIR}"
          fi
      
      - name: Upload Trivy scan results to GitHub Security tab
        if: inputs.upload_to_security_tab == true && inputs.format == 'sarif'
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4.32.4
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Upload scan results as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-scan-results
          path: trivy-results.*
          retention-days: 5
